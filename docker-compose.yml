services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - ./data:/data
    depends_on:
      - redis

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.trainer
    volumes:
      - ./data:/data
      - ./ml:/workspace/ml
      - ./app:/workspace/app
      - ./tools:/workspace/tools
    profiles:
      - training

  redis:
    image: redis:7
    ports:
      - "6379:6379"
